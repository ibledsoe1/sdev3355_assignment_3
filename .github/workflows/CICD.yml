name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # dummy url for testing
      POSTGRES_URL: postgresql+asyncpg://user:password@localhost/testdb
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
        
      - name: product_service install dependencies
        run: pip install -r campus_store/product_service/requirements.txt

      - name: order_service install dependencies
        run: pip install -r campus_store/order_service/requirements.txt

      - name: Run tests
        run: pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log into GitHub container registry 
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Build product_service image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/product_service:latest \
          ./campus_store/product_service
          
      - name: Build order_service image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/order_service:latest \
          ./campus_store/order_service

      # Only push IF we're pushing, not pulling
      - name: Push product_service image
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ github.repository }}/product_service:latest
      
      - name: Push order_service image
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ github.repository }}/order_service:latest